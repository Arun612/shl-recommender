services:
  - type: web
    name: shl-recommender
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: GEMINI_API_KEY
        sync: false   # set this in Render dashboard
    healthCheckPath: /health
    autoDeploy: true
